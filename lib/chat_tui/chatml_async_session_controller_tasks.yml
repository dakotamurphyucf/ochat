version: 1
scope:
  project: "ochat"
  target_file: "Cross-cutting changes across lib/chat_tui/, lib/chat_response/, and related tests/docs to support async moderator/session orchestration without interrupting active turns."
  principle: "Preserve the current single-active-turn model while making moderator-driven async events, deferred user steering, and idle-time follow-up turns consistent across chat_tui, in_memory_stream, and Moderator_manager."
  status_values:
    - pending
    - inprogress
    - finished
plan:
  what: "Refactor chat_tui and shared moderation integration into an explicit session-controller architecture that can process moderator wakeups and background async completions while idle, keep the UI synchronized with moderator-visible transcript state, and preserve deferred user steering during active tool/model workflows."
  why: "The current implementation is coherent for a single active streaming turn, but background model-job completions and richer future async effects can enqueue moderator internal events without any idle UI drain path. The result is stale overlay state, delayed runtime requests, and no clean way for moderator scripts to trigger follow-up turns, notifications, or transcript updates when no turn is currently active."
  constraints:
    - "Do not interrupt an in-flight model/tool workflow by injecting a new user message directly into canonical history mid-turn."
    - "Preserve the existing product behavior that user steering submitted during streaming is deferred and only applied at a safe model-input boundary."
    - "Keep at most one active completion/turn at a time."
    - "Maintain the current role split: Moderator_manager owns durable moderator state and queued internal events; in_memory_stream owns one active turn; chat_tui owns UI/session control."
    - "Background async producers must never mutate the TUI model directly; they may only enqueue moderator/internal work and wake the session controller."
    - "No-moderator prompts must remain as close as possible to current behavior."
    - "Treat visible transcript messages as a projection of canonical history through moderator effective history; refresh that projection whenever moderator-visible state changes at a safe point."
    - "Keep deferred steering notes ephemeral session-controller state unless an explicit product decision is made to persist them."
    - "Request_turn must remain continuation-safe during active turns and become schedulable while idle."
    - "Preserve current startup/resume behavior and moderator snapshot compatibility unless a task explicitly changes persisted schema."
    - "Any new session wakeup registration must have an explicit cleanup story so stale callbacks do not outlive the TUI session."
  agent_guidance:
    - "Prefer introducing a small helper module under lib/chat_tui/ for session-controller logic rather than growing app_reducer.ml indefinitely."
    - "Land event/runtime state scaffolding before changing async producer plumbing or in_memory_stream."
    - "Keep the current reducer loop single-threaded from the TUI’s point of view; use internal stream wakeups to serialize async work."
    - "When adding new internal events, ensure stale op ids cannot accidentally apply to a new turn."
    - "If a background wakeup arrives during an active turn, mark session state dirty and defer real work to a safe point rather than interrupting streaming."
    - "Preserve the existing deferred-steering intent: the user can steer a running turn, but the turn should not be restarted or spliced mid-reasoning."
    - "When centralizing moderator outcome handling, avoid duplicating runtime-request semantics between in_memory_stream and chat_tui."
    - "Write tests for both idle and active-turn cases before relying on the new controller logic."
    - "Document any newly introduced internal event names and safe-point rules in docs-src/ and/or test-scripts.md so script authors understand the runtime model."
    - "Be explicit about notifier/session lifecycle cleanup when registering wakeup callbacks with model_executor or any future async producer."
tasks:
  - id: 1
    status: finished
    name: "Introduce explicit chat_tui session-controller state and internal events"
    notes: |
      Add typed chat_tui state for moderator wakeups, deferred steering notes,
      and queued turn scheduling. Introduce explicit internal events for
      moderator wakeups and turn starts that are not tied to a fresh user
      submit, while keeping the existing reducer as the single serialized owner
      of UI/session mutations.
      - Added App_runtime.session_controller state with moderator_dirty,
        deferred_user_notes, and pending_turn_request plus helper predicates.
      - Added `Moderator_wakeup and `Start_turn internal events; reducer now
        records them safely without changing turn-start behavior yet.
      - Streaming-time Submit_requested now records deferred_user_notes while
        preserving the existing system-note steering path.
      - dune build: OK.
      - dune runtest: OK.
    touches:
      - "lib/chat_tui/app_events.ml"
      - "lib/chat_tui/app_runtime.ml"
      - "lib/chat_tui/app.ml"
      - "lib/chat_tui/app_reducer.ml"
  - id: 2
    status: finished
    name: "Add async moderator wakeup plumbing from background producers"
    notes: |
      Add a session wakeup notifier path so model_executor background
      completions can wake an idle chat_tui session after enqueueing moderator
      internal events. Include notifier registration and cleanup semantics so
      stale session callbacks are not retained after shutdown/resume changes.
      - Added model_executor session_wakeups registration with optional
        on_wakeup callback and unregister_session_wakeup cleanup.
      - Background job delivery now triggers wakeups only after
        enqueue_internal_event succeeds, while remaining inert when no
        notifier is registered.
      - chat_tui now registers a `Moderator_wakeup notifier at startup and
        unregisters it via Fun.protect cleanup on reducer exit.
      - Added regression coverage for wakeup delivery and unregister behavior
        in chat_response_moderator_executor_test.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [1]
    touches:
      - "lib/chat_response/model_executor.ml"
      - "lib/chat_tui/app.ml"
      - "lib/chat_tui/app_runtime.ml"
      - "lib/chat_tui/app_events.ml"
      - "test/"
  - id: 3
    status: finished
    name: "Extract shared moderator outcome interpreter for session control"
    notes: |
      Create a shared chat_tui helper that interprets moderator runtime
      requests and related session-visible outcomes for startup, active-turn,
      and idle-drain paths. The helper should produce structured actions such
      as queue_compaction, set_halted_reason, refresh_visible_messages, and
      schedule_turn rather than scattering that logic across reducer branches.
      - Added Moderator_session_controller helper with explicit structured
        output fields for refresh/compaction/turn scheduling/halt/notices plus
        internal events to enqueue.
      - app.ml startup handling and app_reducer active-turn runtime-request
        handling now both use the shared interpreter instead of bespoke logic.
      - Startup/runtime semantics preserve compaction and end-session behavior;
        active-turn path explicitly ignores request_turn because in_memory_stream
        still owns turn continuation semantics.
      - Added inline tests covering end-session precedence and ignored
        request_turn handling.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [1]
    touches:
      - "lib/chat_tui/"
      - "lib/chat_tui/app_reducer.ml"
      - "lib/chat_tui/app_runtime.ml"
      - "test/"
  - id: 4
    status: finished
    name: "Implement idle/background moderator drain flow in chat_tui"
    notes: |
      Add an idle-time reducer path that drains Moderator_manager queued
      internal events when a wakeup arrives and no turn is active. If a wakeup
      arrives during an active turn, record dirty state and defer real work to
      a later safe point rather than interrupting streaming.
      - Added moderator drain helpers to Moderator_session_controller so idle
        drains and startup combine moderator outcomes through one shared path.
      - Reducer wakeups now drain immediately when idle, mark dirty during
        active ops, and revisit the drain at post-stream/post-compaction safe
        points before starting other pending work.
      - Idle drains now refresh visible messages when overlay state changes and
        can schedule idle follow-up turns via `Start_turn without synthetic
        submits.
      - Added reducer expect tests covering idle wakeup draining and active-turn
        deferral until a safe point.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [1, 2, 3]
    touches:
      - "lib/chat_tui/app_reducer.ml"
      - "lib/chat_tui/app_runtime.ml"
      - "lib/chat_tui/app.ml"
      - "lib/chat_response/moderator_manager.ml"
      - "test/"
  - id: 5
    status: finished
    name: "Decouple turn-start scheduling from user submit flow"
    notes: |
      Separate append-user-and-start-turn from start-turn-from-current-session
      so moderator-requested or async-triggered turns can run while idle
      without synthesizing fake user items. Keep one active turn at a time and
      preserve ordinary submit behavior.
      - App_submit now has a start_from_current_session path plus injected
        start_streaming callback, while ordinary submit still appends the user
        item before launching a User_submit turn.
      - chat_tui reducer now consumes pending_turn_request when idle, starts
        follow-up turns without fake user items, and lets queued compaction or
        explicit submits take precedence.
      - Added explicit turn origin metadata in App_runtime
        (active_turn_start_reason) and debug logging for started turns.
      - Added testable UI size callback plumbing and updated reducer tests to
        assert idle wakeups now start follow-up turns immediately at safe
        points.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [1, 3, 4]
    touches:
      - "lib/chat_tui/app_submit.ml"
      - "lib/chat_tui/app_reducer.ml"
      - "lib/chat_tui/app_runtime.ml"
      - "lib/chat_tui/app_events.ml"
      - "test/"
  - id: 6
    status: finished
    name: "Formalize deferred user steering notes as queued safe-point inputs"
    notes: |
      Replace the reducer-only system_event shortcut with explicit queued
      deferred steering notes in session-controller state. Preserve the current
      product behavior: notes must not interrupt an in-flight turn and must be
      injected only at a safe model-input boundary.
      - Replaced the reducer-side system_event stream shortcut with explicit
        deferred-note queue helpers in App_runtime plus a structured
        Safe_point_input source passed through App_streaming into
        In_memory_stream.
      - Active-streaming submit now queues deferred steering notes without
        mutating canonical history; in-memory streaming consumes them only at
        the existing safe-point hook and logs the tool-result boundary.
      - Added reducer regression coverage that queued notes render in the same
        <system-reminder> format and drain FIFO from session-controller state.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [1, 5]
    touches:
      - "lib/chat_tui/app_reducer.ml"
      - "lib/chat_tui/app_runtime.ml"
      - "lib/chat_tui/app_streaming.ml"
      - "lib/chat_response/in_memory_stream.ml"
      - "test/"
  - id: 7
    status: finished
    name: "Refactor in_memory_stream safe-point integration for deferred notes and pending moderator work"
    notes: |
      Teach in_memory_stream to consume deferred steering notes and pending
      moderator work only at explicit safe points such as post-tool-result
      continuation and post-turn decision boundaries. Preserve existing
      moderation event ordering and no-moderator behavior as closely as
      possible.
      - Refactored in_memory_stream around explicit safe points: pre-tool-call
        no longer drains internal events, post-tool-result and turn-end now
        perform the queue drain explicitly, and turn-start request preparation
        owns request-boundary safe-point behavior.
      - Deferred steering notes are now request-only at turn start: they are
        appended as transient system input after moderator overlay/effective
        history is computed, so they no longer mutate canonical tool output
        history.
      - run_turn now respects turn-start safe-point runtime requests before
        issuing another model request, while preserving tool-followup and
        request_turn continuation logic.
      - Added regression coverage for request-boundary safe-point ordering and
        for deferred notes surviving turn_end until the next turn start.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [3, 4, 5, 6]
    touches:
      - "lib/chat_response/in_memory_stream.ml"
      - "lib/chat_response/driver.ml"
      - "lib/chat_tui/app_streaming.ml"
      - "test/"
  - id: 8
    status: finished
    name: "Keep UI transcript, notifications, and halted state synchronized with moderator-visible state"
    notes: |
      Define and implement consistent refresh rules for moderator-visible UI
      state. The TUI should continue applying raw token/tool patches for
      responsiveness, but must reproject visible messages and notices at safe
      boundaries after idle drains, final streaming reconciliation, and other
      moderator-visible state changes.
      - App_runtime.refresh_messages now rebuilds the visible transcript from
        moderator-effective history, reindexes tool-output metadata against the
        visible items, clamps message selection, and clears render caches so
        safe-point refreshes do not leave stale indices or images behind.
      - Added Model.rebuild_tool_output_index_for_items and
        Model.clamp_selected_message so safe-point refreshes can keep tool
        rendering and selection aligned with moderated transcript projection.
      - Startup and reducer moderator-outcome application now dedupe repeated
        system notices and apply refreshes before appending notices so halt
        notifications are not lost or duplicated across startup, active-turn,
        and idle-drain paths.
      - Simplified full-history replacement paths to rely on the shared
        refresh helper instead of manually rebuilding tool metadata in several
        branches.
      - Added regression coverage for moderated tool-output reindexing,
        selection clamping after refresh, and duplicate notice suppression.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [3, 4, 5, 6, 7]
    touches:
      - "lib/chat_tui/app_runtime.ml"
      - "lib/chat_tui/app_reducer.ml"
      - "lib/chat_tui/app_stream_apply.ml"
      - "lib/chat_tui/model.ml"
      - "test/"
  - id: 9
    status: finished
    name: "Add regression coverage for idle async moderation and deferred steering"
    notes: |
      Add deterministic tests covering idle wakeups, queued moderator internal
      event drains, moderator-requested idle turns, deferred steering during an
      active turn, and UI refresh after idle overlay changes. Include no-
      moderator regression checks so the new controller paths do not perturb
      baseline behavior.
      - Extended chat_tui_moderator_wakeup_test with a real model_executor
        completion path that wakes an idle reducer, drains the queued moderator
        internal event, and refreshes visible messages without requiring a
        later user action.
      - Strengthened active-turn wakeup coverage to assert no overlapping
        follow-up turn starts before the current stream reaches its safe point.
      - Added a no-moderator reducer regression showing deferred steering notes
        survive an actual stream boundary, remain out of canonical history, and
        are consumed only when the next turn request is prepared.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [4, 5, 6, 7, 8]
    touches:
      - "test/"
      - "lib/chat_tui/"
      - "lib/chat_response/"
  - id: 10
    status: finished
    name: "Update architecture docs and script-facing runtime semantics"
    notes: |
      Update docs to describe the session-controller architecture, idle
      moderator wakeups, safe-point transcript refresh rules, and deferred
      steering semantics. Include at least one narrative for idle async
      completion and one for non-interrupting user steering during a tool flow.
      - Updated Readme.md to document the current role split between
        Moderator_manager, In_memory_stream, and chat_tui, plus idle wakeups,
        safe-point refreshes, deferred steering notes, and idle Request_turn
        behavior.
      - Updated the ChatMD language reference with implementation-faithful
        runtime semantics for Item_appended vs message_appended, safe points,
        idle wakeups, deferred steering notes, and end-to-end narratives for
        background model completions and non-interrupting steering.
      - Updated test-scripts.md so script-facing examples mention the current
        chat_tui safe-point model and idle follow-up semantics.
      - dune build: OK.
      - dune runtest: OK.
    depends_on: [9]
    touches:
      - "Readme.md"
      - "docs-src/"
      - "test-scripts.md"
