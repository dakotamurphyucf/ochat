version: 1
scope:
  project: "ochat"
  target_file: "Cross-cutting changes across lib/chatmd/, lib/chat_response/, lib/chat_tui/, lib/session.ml, lib/session_store.ml, bin/chat_tui.ml, and docs-src/."
  principle: "Integrate ChatML as a host-managed conversation moderation layer without changing existing behavior when no ChatML script is present."
  status_values:
    - pending
    - inprogress
    - finished
plan:
  what: "Add host-managed ChatML moderation to ChatMD prompts, shared chat drivers, TUI session flow, and persisted session state."
  why: "The repository already implements the ChatML language and moderator runtime, but it is not yet wired into ChatMD prompts or the driver/session lifecycle used by agent workflows."
  constraints:
    - "Preserve existing behavior for prompts that do not define a ChatML script."
    - "Keep ChatML host-managed: scripts emit tasks and events, while all real IO remains in OCaml host code."
    - "Compile scripts once per prompt load and instantiate a fresh ChatML runtime environment per session."
    - "Persist only serializable moderator state; never attempt to persist closures, refs, builtins, modules, or tasks directly."
    - "Keep transcript/export semantics explicit for synthetic or moderated messages."
    - "Maintain compatibility across chat_tui, file-backed drivers, and nested agent execution."
    - "For v1, support exactly one moderator script per prompt; zero scripts keeps baseline behavior and more than one script is a prompt validation error."
    - "The new ChatMD script element is host-managed and must be ignored by prompt-to-model conversion."
    - "Use a durable host overlay separate from canonical model history; compute effective request history by applying the overlay before each model turn."
    - "Assign stable host message ids to projected messages when upstream history items do not carry ids, so replace/delete moderation can target any message."
    - "Represent queued internal events as raw ChatML values and replay them FIFO through the host manager after successful event handling."
  agent_guidance:
    - "Implement shared moderation logic below frontend-specific code so chat_tui and run_agent reuse the same path."
    - "Land parser/model changes before driver integration so script metadata is available early in the pipeline."
    - "Add session-schema migrations together with any new persisted moderator fields."
    - "Back each integration step with targeted tests before moving to the next layer."
    - "Use the fixed v1 script syntax from the details file: either inline <script language=\"chatml\" kind=\"moderator\" id=\"main\">...</script> or file-based <script language=\"chatml\" kind=\"moderator\" id=\"main\" src=\"moderator.chatml\" />."
    - "Use the fixed v1 phases from the details file: session_start, session_resume, turn_start, message_appended, pre_tool_call, post_tool_response, turn_end, and internal_event."
    - "Create the shared host manager under lib/chat_response/ rather than inside chat_tui; chat_tui should call into it, not duplicate it."
    - "When multiple tool moderation actions are emitted for one pre_tool_call event, treat that as a host error instead of guessing precedence."
    - "When a tool call is rejected, synthesize the corresponding tool output item and continue the recursive response loop without executing the tool."
    - "When adding persisted moderator state, store explicit typed snapshot fields in Session.t rather than stuffing structured state into kv_store."
tasks:
  - id: 1
    status: finished
    name: "Add ChatMD script element to the typed prompt model"
    notes: |
      Add a new top-level ChatMD element named <script>. For v1 it must accept
      only language="chatml" and kind="moderator". Support either inline body
      text or a src attribute, but not both. Extend the typed prompt model with
      a Script case and ensure Chat_response.Converter.to_items ignores it so
      scripts stay host-managed and model-invisible.
      - Added Script to the closed ChatMD tag set, typed prompt model, and parser flow.
      - Parsed inline and src-backed script declarations into Prompt.Chat_markdown.Script.
      - Chat_response.Converter.to_items now ignores Script elements.
      - Verification: dune build OK; dune runtest test OK.
    touches:
      - "lib/chatmd/chatmd_ast.ml"
      - "lib/chatmd/chatmd_lexer.mll"
      - "lib/chatmd/chatmd_parser.mly"
      - "lib/chatmd/prompt.mli"
      - "lib/chatmd/prompt.ml"
      - "lib/chat_response/converter.ml"
      - "test/"
  - id: 2
    status: finished
    name: "Resolve and validate embedded ChatML script sources"
    notes: |
      Resolve script src paths relative to the prompt directory already passed
      into parse_chat_inputs. Inline script bodies must preserve source text
      well enough for compile errors to remain readable. Reject multiple
      moderator scripts per prompt, reject invalid attributes, and document the
      exact syntax in docs-src/overview/chatmd-language.md.
      - Added script validation for language, kind, id, supported attributes, and src/body exclusivity.
      - Script src files now load during parse_chat_inputs and keep both path and loaded source text.
      - Enforced the single-script-per-prompt v1 rule during prompt parsing.
      - Documented <script> syntax and host-managed loading rules in the ChatMD guide.
      - Verification: dune build OK; dune runtest test OK.
    depends_on: [1]
    touches:
      - "lib/chatmd/prompt.mli"
      - "lib/chatmd/prompt.ml"
      - "test/"
      - "docs-src/overview/chatmd-language.md"
  - id: 3
    status: finished
    name: "Introduce shared moderation host interfaces and lifecycle event model"
    notes: |
      Create the shared host-managed moderation layer under lib/chat_response/.
      Define the v1 lifecycle phases session_start, session_resume, turn_start,
      message_appended, pre_tool_call, post_tool_response, turn_end, and
      internal_event. Define context projection, stable host message ids,
      overlay state, and tool moderation/result types in this shared layer.
      - Added Chat_response.Moderation with shared phase, event, projection, overlay, outcome, and capability-registry types.
      - Added runtime helpers to decode committed ChatML local effects into structured host-facing effects.
      - Documented the new moderation module and linked it from the driver docs.
      - Added expect coverage for stable host ids, local-effect decoding, and named model recipe adapters.
      - Verification: dune build OK; dune runtest test OK.
    depends_on: [1, 2]
    touches:
      - "lib/chat_response/"
      - "lib/chatml/chatml_moderator_runtime.mli"
      - "lib/chatml/chatml_moderator_runtime.ml"
      - "docs-src/lib/"
      - "test/"
  - id: 4
    status: finished
    name: "Add serializable ChatML data snapshot codec for moderator state"
    notes: |
      Extend the ChatML codec layer with a data-only serializer for persisted
      moderator state and queued internal events. It must round-trip plain data
      values used for script state/events and reject runtime-only values such
      as closures, refs, builtins, modules, and tasks with descriptive errors.
      - Added Chatml_value_codec.Snapshot with a stable data-only snapshot tree and round-trip helpers.
      - Snapshot encoding now supports scalar data, arrays, records, and variants while rejecting refs, closures, modules, builtins, and tasks with path-aware errors.
      - Added expect coverage for supported round-trips, runtime-only rejections, and duplicate record-field validation.
      - Verification: dune build OK; dune runtest test OK.
    depends_on: [3]
    touches:
      - "lib/chatml/chatml_value_codec.mli"
      - "lib/chatml/chatml_value_codec.ml"
      - "test/chatml_*"
  - id: 5
    status: finished
    name: "Extend Session schema and migrations for moderator snapshots"
    notes: |
      Add explicit moderator snapshot fields to Session.t. The persisted
      snapshot must include current ChatML durable state, queued internal
      events, halted flag, and host overlay snapshot. Update schema versioning,
      migrations, session store load/save, and persistence tests together.
      - Added explicit Session.Moderator_snapshot types plus a typed moderator_snapshot field on Session.t.
      - Bumped the session schema to v3, added Legacy.V2 migration support, and defaulted pre-feature sessions to no moderator snapshot.
      - Session reset flows now clear persisted moderator state, and direct snapshot readers now reuse legacy-aware loading through Session_store.
      - Added persistence coverage for round-tripping moderator snapshots, legacy upgrades, and reset semantics.
      - Verification: dune build OK; dune runtest test OK.
    depends_on: [4]
    touches:
      - "lib/session.mli"
      - "lib/session.ml"
      - "lib/session_store.ml"
      - "bin/chat_tui.ml"
      - "test/session_persistence_test.ml"
  - id: 6
    status: finished
    name: "Implement compile-once script registry and per-session runtime manager"
    notes: |
      Build a manager that compiles the single v1 moderator script once per
      prompt load and instantiates a fresh ChatML runtime session per resumed
      chat session. It must restore/save snapshots, feed context+events into
      Chatml_moderator_runtime.handle_event, collect committed local effects,
      and drain queued internal events.
      - Added Chat_response.Moderator_manager with a source-hash keyed compile cache, per-session runtime instances, overlay tracking, effective-history projection, snapshot extraction, and internal-event draining.
      - Extended Chatml_moderator_runtime with restore and queued-event pop helpers so persisted moderator state can be reinstated cleanly.
      - Added expect coverage for compile-once caching, snapshot/restore round-trips, internal-event draining, and mismatched snapshot metadata failures.
      - Verification: dune build OK; dune runtest test OK.
    depends_on: [3, 4, 5]
    touches:
      - "lib/chat_response/"
      - "lib/chatml/chatml_moderator_runtime.mli"
      - "lib/chatml/chatml_moderator_runtime.ml"
      - "test/chatml_moderator_runtime_test.ml"
      - "test/"
  - id: 7
    status: pending
    name: "Integrate moderation into shared in-memory turn lifecycle"
    notes: |
      Wire the shared moderation manager into lib/chat_response/in_memory_stream.ml.
      Moderate before posting the next model request and after the assistant
      turn completes. Apply the host overlay to canonical history to produce
      the effective request history. Keep no-script behavior as close to
      baseline as practical and verified by regression tests.
    depends_on: [6]
    touches:
      - "lib/chat_response/in_memory_stream.ml"
      - "lib/chat_response/driver.mli"
      - "lib/chat_response/driver.ml"
      - "test/"
  - id: 8
    status: pending
    name: "Integrate tool moderation, runtime tasks, and internal event draining"
    notes: |
      Intercept tool calls before Tool_call.run_tool, run the pre_tool_call
      moderation event, and either approve, reject, rewrite args, or redirect.
      Rejected calls must emit synthetic tool output items instead of executing
      the tool. Feed post_tool_response events back through the manager and
      replay queued internal events FIFO in phase internal_event.
    depends_on: [6, 7]
    touches:
      - "lib/chat_response/tool_call.ml"
      - "lib/chat_response/in_memory_stream.ml"
      - "lib/chat_response/"
      - "test/"
  - id: 9
    status: pending
    name: "Wire moderation through chat_tui startup, submit, and reducer flow"
    notes: |
      Thread moderator script metadata and session snapshots through
      lib/chat_tui/app.ml, app_submit.ml, app_reducer.ml, and model state.
      chat_tui must reuse the shared moderation manager, not reimplement it.
      Submit-time request assembly must use moderated effective history, while
      UI-only patches remain separate from canonical moderated history.
    depends_on: [6, 7, 8]
    touches:
      - "lib/chat_tui/app.ml"
      - "lib/chat_tui/app_submit.ml"
      - "lib/chat_tui/app_reducer.ml"
      - "lib/chat_tui/app_events.mli"
      - "lib/chat_tui/model.ml"
      - "test/chat_tui_*"
      - "test/"
  - id: 10
    status: pending
    name: "Reuse the moderation layer in file-backed drivers and run_agent"
    notes: |
      Extend run_completion, run_completion_stream, and run_agent so they use
      the same moderation manager and script extraction path as chat_tui.
      Nested agent prompts must be able to declare their own single moderator
      script and get the same host-managed behavior.
    depends_on: [7, 8]
    touches:
      - "lib/chat_response/driver.mli"
      - "lib/chat_response/driver.ml"
      - "lib/mcp/mcp_prompt_agent.ml"
      - "test/"
  - id: 11
    status: pending
    name: "Persist and export moderated transcript materializations"
    notes: |
      Decide and implement how overlay-derived synthetic messages and denied
      tool responses appear in canonical history, persisted session snapshots,
      and exported ChatMD transcripts. The exported transcript must remain
      human-readable and preserve moderated conversation semantics on resume.
    depends_on: [5, 9, 10]
    touches:
      - "lib/chat_tui/persistence.mli"
      - "lib/chat_tui/persistence.ml"
      - "lib/chat_tui/export.ml"
      - "bin/chat_tui.ml"
      - "test/"
  - id: 12
    status: pending
    name: "Add end-to-end regression coverage for moderation-enabled workflows"
    notes: |
      Add parser, codec, session migration, shared driver, tool moderation,
      chat_tui, and resume/export tests. Include both no-script and
      moderation-enabled cases, plus rollback/error-path coverage for failed
      tasks, rejected tools, malformed scripts, and resumed sessions.
    depends_on: [1, 2, 6, 7, 8, 9, 10, 11]
    touches:
      - "test/"
  - id: 13
    status: pending
    name: "Update ChatMD and ChatML documentation for host-managed moderation"
    notes: |
      Update README, ChatMD docs, and ChatML docs so they describe the new
      <script> syntax, single-script v1 limitation, host lifecycle phases,
      overlay behavior, named model recipes, internal events, and what session
      state is and is not persisted.
    depends_on: [1, 2, 6, 7, 8, 9, 10, 11, 12]
    touches:
      - "Readme.md"
      - "docs-src/overview/chatmd-language.md"
      - "docs-src/guide/chatml-language-spec.md"
      - "docs-src/lib/"
